<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>GlassNote</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#f5e8e8;--surface:rgba(255,255,255,0.40);--surface-hov:rgba(255,255,255,0.58);--surface-deep:rgba(255,255,255,0.18);
  --border:rgba(255,255,255,0.68);--border2:rgba(255,255,255,0.28);
  --shadow:rgba(180,60,60,0.14);--shadow2:rgba(140,40,40,0.09);
  --text:#1a2a38;--text2:#5a2a2a;--text3:#a06060;
  --accent:#e53535;--accent2:#b91c1c;--accent-glass:rgba(229,53,53,0.15);
  --ai:#7c3aed;--ai2:#6d28d9;--ai-glass:rgba(124,58,237,0.11);--ai-border:rgba(124,58,237,0.22);
  --red:#ef4444;--green:#22c55e;--amber:#f59e0b;
  --tab-active:rgba(255,255,255,0.72);--tab-inactive:rgba(255,255,255,0.22);
  --input-bg:rgba(255,255,255,0.48);
  --radius:18px;--radius-sm:10px;--blur:24px;--transition:0.26s cubic-bezier(.4,0,.2,1);
}
[data-theme="dark"]{
  --bg:#0d1520;--surface:rgba(255,255,255,0.06);--surface-hov:rgba(255,255,255,0.11);--surface-deep:rgba(255,255,255,0.03);
  --border:rgba(255,255,255,0.11);--border2:rgba(255,255,255,0.05);
  --shadow:rgba(0,0,0,0.42);--shadow2:rgba(0,0,0,0.24);
  --text:#e8f0f8;--text2:#a0b8d0;--text3:#5a7a98;
  --accent:#f87171;--accent2:#fca5a5;--accent-glass:rgba(248,113,113,0.11);
  --ai:#a78bfa;--ai2:#8b5cf6;--ai-glass:rgba(167,139,250,0.09);--ai-border:rgba(167,139,250,0.20);
  --tab-active:rgba(255,255,255,0.10);--tab-inactive:rgba(255,255,255,0.04);
  --input-bg:rgba(255,255,255,0.07);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);transition:background var(--transition),color var(--transition);overflow:hidden}

.bg-blobs{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.52;animation:drift 14s ease-in-out infinite alternate}
.blob1{width:520px;height:520px;background:radial-gradient(circle,#fca5a5 0%,#ef444448 60%,transparent 80%);top:-130px;left:-110px}
.blob2{width:440px;height:440px;background:radial-gradient(circle,#34d39938 0%,#06b6d428 60%,transparent 80%);bottom:-90px;right:-90px;animation-delay:-5s}
.blob3{width:320px;height:320px;background:radial-gradient(circle,#c4b5fd38 0%,#7c3aed18 60%,transparent 80%);bottom:30%;left:18%;animation-delay:-9s}
[data-theme="dark"] .blob1{background:radial-gradient(circle,#7f1d1d 0%,#450a0a78 60%,transparent 80%);opacity:.68}
[data-theme="dark"] .blob2{background:radial-gradient(circle,#064e3b28 0%,#0e749058 30%,transparent 80%);opacity:.48}
[data-theme="dark"] .blob3{background:radial-gradient(circle,#4c1d9558 0%,#3b0764 60%,transparent 80%);opacity:.55}
@keyframes drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(38px,28px) scale(1.07)}}

#app{position:relative;z-index:1;display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;padding:env(safe-area-inset-top,0) 0 env(safe-area-inset-bottom,0)}
.glass{background:var(--surface);backdrop-filter:blur(var(--blur)) saturate(1.65);-webkit-backdrop-filter:blur(var(--blur)) saturate(1.65);border:1px solid var(--border);box-shadow:0 8px 32px var(--shadow),0 1px 0 var(--border) inset,0 -1px 0 var(--border2) inset}

/* topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 8px;flex-shrink:0}
.logo{font-family:'Fraunces',serif;font-size:1.38rem;font-weight:600;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.02em}
.logo span{font-style:italic;font-weight:300}
.topbar-right{display:flex;gap:5px;align-items:center}
.icon-btn{width:34px;height:34px;border:none;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--surface);backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));border:1px solid var(--border);color:var(--text);transition:all var(--transition);box-shadow:0 3px 10px var(--shadow2);position:relative;flex-shrink:0}
.icon-btn:active{transform:scale(.91)}
.icon-btn svg{width:16px;height:16px}

/* sync indicator */
.sync-pill{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:.68rem;font-weight:500;background:var(--surface);border:1px solid var(--border);color:var(--text3);transition:all .3s;flex-shrink:0}
.sync-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .3s}
.sync-pill.synced .dot{background:var(--green)}
.sync-pill.synced{color:var(--green)}
.sync-pill.syncing .dot{background:var(--amber);animation:blink 1s infinite}
.sync-pill.syncing{color:var(--amber)}
.sync-pill.error .dot{background:var(--red)}
.sync-pill.error{color:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* toolbar */
.toolbar{display:flex;gap:5px;padding:0 14px 8px;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.toolbar::-webkit-scrollbar{display:none}
.tool-btn{display:flex;align-items:center;gap:4px;white-space:nowrap;padding:5px 11px;border:none;cursor:pointer;border-radius:20px;font-family:'DM Sans',sans-serif;font-size:.71rem;font-weight:500;background:var(--surface);color:var(--text2);border:1px solid var(--border);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);transition:all .18s;box-shadow:0 2px 8px var(--shadow2)}
.tool-btn:active{transform:scale(.94)}
.tool-btn svg{width:12px;height:12px;flex-shrink:0}
.tool-btn.danger{color:var(--red);border-color:rgba(229,53,53,.22);background:rgba(229,53,53,.07)}
.tool-btn.primary{color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;box-shadow:0 3px 10px rgba(229,53,53,.28)}
.tool-btn.ai-btn{color:var(--ai);border-color:var(--ai-border);background:var(--ai-glass)}
.tool-btn.share-btn{color:var(--green);border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.08)}

/* tabs */
.tabs-wrap{padding:0 14px 8px;flex-shrink:0}
.tabs{display:flex;gap:4px;padding:4px;border-radius:var(--radius)}
.tab-btn{flex:1;padding:8px 2px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.71rem;font-weight:500;border-radius:calc(var(--radius) - 4px);background:var(--tab-inactive);color:var(--text2);transition:all var(--transition);display:flex;flex-direction:column;align-items:center;gap:3px}
.tab-btn svg{width:15px;height:15px;opacity:.7}
.tab-btn.active{background:var(--tab-active);color:var(--accent);box-shadow:0 3px 12px var(--shadow),0 1px 0 var(--border) inset}
.tab-btn.active svg{opacity:1}
.tab-btn[data-tab="ai"].active{color:var(--ai)}

/* panels */
.panel-wrap{flex:1;overflow:hidden;padding:0 14px}
.panel{display:none;flex-direction:column;gap:10px;height:100%;overflow-y:auto;padding-bottom:100px;scrollbar-width:none}
.panel::-webkit-scrollbar{display:none}
.panel.active{display:flex}
.section-label{font-family:'Fraunces',serif;font-size:.73rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:4px 2px 2px}

/* note card */
.note-card{border-radius:var(--radius);overflow:hidden;transition:transform var(--transition)}
.note-card:active{transform:scale(.987)}
.note-header{display:flex;align-items:center;justify-content:space-between;padding:11px 13px 5px}
.note-title-input,.note-body-input{width:100%;border:none;background:transparent;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;resize:none}
.note-title-input{font-size:.95rem;font-weight:500;padding:0 13px;letter-spacing:-.01em}
.note-title-input::placeholder,.note-body-input::placeholder{color:var(--text3)}
.note-body-input{font-size:.84rem;line-height:1.6;color:var(--text2);padding:3px 13px 11px;min-height:56px}
.note-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.note-meta{font-size:.68rem;color:var(--text3);padding:0 13px 8px}
.del-btn{width:24px;height:24px;border:none;cursor:pointer;border-radius:50%;background:var(--surface-deep);color:var(--text3);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .18s;border:1px solid var(--border2)}
.note-card:hover .del-btn,.note-card:focus-within .del-btn{opacity:1}
.del-btn svg{width:11px;height:11px}
.add-card{border-radius:var(--radius);border:1.5px dashed var(--border);padding:11px 13px;display:flex;align-items:center;gap:9px;cursor:pointer;background:var(--surface-deep);color:var(--text3);font-size:.84rem;transition:all var(--transition)}
.add-card:hover{background:var(--surface);border-color:var(--accent)}
.add-card svg{width:16px;height:16px;flex-shrink:0;color:var(--accent)}

/* tasks */
.task-group{display:flex;flex-direction:column;gap:3px}
.task-item{display:flex;align-items:flex-start;gap:9px;padding:10px 11px;border-radius:var(--radius-sm)}
.task-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface-deep);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:1px}
.task-check.done{background:var(--green);border-color:var(--green)}
.task-check.done svg{opacity:1}
.task-check svg{width:10px;height:10px;color:#fff;opacity:0;transition:opacity .2s}
.task-text{flex:1;min-width:0}
.task-input{width:100%;border:none;background:transparent;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.87rem;outline:none}
.task-input::placeholder{color:var(--text3)}
.task-input.done-text{text-decoration:line-through;color:var(--text3)}
.task-due{font-size:.68rem;color:var(--text3);margin-top:1px}
.task-prio{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:8px}
.prio-high{background:var(--red)}.prio-med{background:var(--amber)}.prio-low{background:var(--green)}

/* appt */
.appt-card{border-radius:var(--radius);padding:11px 13px;display:grid;grid-template-columns:50px 1fr auto;gap:0 11px;align-items:start}
.appt-time{display:flex;flex-direction:column;align-items:center;padding-top:2px}
.appt-time-main{font-family:'Fraunces',serif;font-size:1.12rem;font-weight:600;line-height:1;color:var(--accent)}
.appt-time-ampm{font-size:.6rem;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.06em}
.appt-body{grid-column:2}
.appt-title-txt{font-size:.9rem;font-weight:500}
.appt-meta{display:flex;gap:5px;flex-wrap:wrap;margin-top:3px}
.appt-tag{font-size:.66rem;padding:2px 6px;border-radius:20px;background:var(--accent-glass);color:var(--accent);border:1px solid rgba(229,53,53,.18)}
.appt-actions{grid-column:3}
.tag-work{background:rgba(99,102,241,.14);color:#6366f1;border-color:rgba(99,102,241,.22)}
.tag-personal{background:rgba(34,197,94,.11);color:#16a34a;border-color:rgba(34,197,94,.22)}
.tag-health{background:rgba(239,68,68,.11);color:#dc2626;border-color:rgba(239,68,68,.22)}
[data-theme="dark"] .tag-personal{color:#4ade80}[data-theme="dark"] .tag-health{color:#f87171}[data-theme="dark"] .tag-work{color:#a5b4fc}

/* calendar */
.calendar-wrap{border-radius:var(--radius);padding:13px;flex-shrink:0}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.cal-month{font-family:'Fraunces',serif;font-size:1rem;font-weight:600}
.cal-nav{background:none;border:none;cursor:pointer;color:var(--text2);width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .18s}
.cal-nav:hover{background:var(--surface-hov)}
.cal-nav svg{width:14px;height:14px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{text-align:center;font-size:.61rem;color:var(--text3);padding:3px 0;text-transform:uppercase;letter-spacing:.04em}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:.79rem;border-radius:50%;cursor:pointer;transition:all .14s;color:var(--text2);position:relative}
.cal-day:hover{background:var(--surface-hov)}
.cal-day.today{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:600}
.cal-day.has-event::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;background:var(--accent)}
.cal-day.today.has-event::after{background:#fff}
.cal-day.other-month{opacity:.32}
.cal-day.selected{box-shadow:0 0 0 2px var(--accent)}

/* Claude AI panel */
#panel-ai{display:none;flex-direction:column;height:100%;gap:0;padding-bottom:0}
#panel-ai.active{display:flex}
.ai-key-banner{border-radius:var(--radius);padding:13px 15px;background:var(--ai-glass);border:1px solid var(--ai-border);display:flex;flex-direction:column;gap:9px;flex-shrink:0}
.ai-key-banner.hidden{display:none}
.ai-key-label{font-size:.73rem;color:var(--ai);font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.ai-key-hint{font-size:.7rem;color:var(--text3);line-height:1.45}
.ai-key-hint a{color:var(--ai);text-decoration:none}
.ai-key-row{display:flex;gap:7px;align-items:center}
.ai-key-input{flex:1;padding:8px 11px;border-radius:var(--radius-sm);border:1px solid var(--ai-border);background:var(--input-bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.83rem;outline:none}
.ai-key-input:focus{border-color:var(--ai)}
.ai-key-save{padding:8px 13px;border:none;cursor:pointer;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--ai),var(--ai2));color:#fff;font-size:.79rem;font-weight:500;white-space:nowrap;flex-shrink:0}
.ai-context-strip{display:flex;gap:5px;padding:0 0 7px;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.ai-context-strip::-webkit-scrollbar{display:none}
.ctx-chip{display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:20px;font-size:.69rem;font-weight:500;white-space:nowrap;cursor:pointer;border:none;background:var(--surface);color:var(--text2);border:1px solid var(--border);transition:all .16s}
.ctx-chip.on{background:var(--ai-glass);color:var(--ai);border-color:var(--ai-border)}
.ctx-chip svg{width:11px;height:11px}
.ai-messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:9px;padding:4px 0 10px;scrollbar-width:none}
.ai-messages::-webkit-scrollbar{display:none}
.msg-row{display:flex;gap:7px;align-items:flex-end;animation:fadeUp .24s ease both}
.msg-row.user{flex-direction:row-reverse}
.msg-avatar{width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.66rem;font-weight:600}
.msg-avatar.ai-av{background:linear-gradient(135deg,var(--ai),var(--ai2));color:#fff}
.msg-avatar.user-av{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.msg-bubble{max-width:80%;padding:9px 12px;border-radius:15px;font-size:.83rem;line-height:1.55}
.msg-row.ai .msg-bubble{background:var(--surface);backdrop-filter:blur(var(--blur)) saturate(1.4);-webkit-backdrop-filter:blur(var(--blur)) saturate(1.4);border:1px solid var(--border);border-bottom-left-radius:4px;box-shadow:0 4px 14px var(--shadow2);color:var(--text)}
.msg-row.user .msg-bubble{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-bottom-right-radius:4px;box-shadow:0 4px 12px rgba(229,53,53,.28)}
.msg-bubble.thinking{color:var(--text3);font-style:italic}
.typing-dots{display:inline-flex;gap:4px;vertical-align:middle;margin-left:4px}
.typing-dots span{width:5px;height:5px;border-radius:50%;background:var(--text3);animation:bounce 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
.ai-action-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.ai-action-chip{padding:4px 10px;border-radius:20px;font-size:.69rem;border:none;cursor:pointer;background:var(--ai-glass);color:var(--ai);border:1px solid var(--ai-border);transition:all .14s}
.ai-action-chip:active{transform:scale(.94)}
.ai-quick-prompts{display:flex;flex-direction:column;gap:6px;padding:2px 0 8px;flex-shrink:0}
.ai-quick-prompts.hidden{display:none}
.qp-label{font-size:.68rem;color:var(--text3);letter-spacing:.05em;text-transform:uppercase}
.qp-row{display:flex;gap:5px;flex-wrap:wrap}
.qp-chip{padding:6px 11px;border-radius:20px;font-size:.74rem;border:none;cursor:pointer;background:var(--surface);color:var(--text2);border:1px solid var(--border);transition:all .14s}
.qp-chip:hover{background:var(--ai-glass);color:var(--ai);border-color:var(--ai-border)}
.ai-input-area{display:flex;gap:7px;align-items:flex-end;padding:8px 0 0;flex-shrink:0;border-top:1px solid var(--border2)}
.ai-textarea{flex:1;padding:9px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.86rem;outline:none;resize:none;min-height:40px;max-height:100px;line-height:1.4;backdrop-filter:blur(8px);transition:border-color .18s}
.ai-textarea:focus{border-color:var(--ai)}
.ai-send-btn{width:38px;height:38px;border:none;cursor:pointer;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--ai),var(--ai2));color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(124,58,237,.32);transition:transform .14s,opacity .18s}
.ai-send-btn:active{transform:scale(.89)}.ai-send-btn:disabled{opacity:.38;cursor:default}
.ai-send-btn svg{width:15px;height:15px}
.ai-clear-btn{width:32px;height:32px;border:none;cursor:pointer;border-radius:50%;background:var(--surface);border:1px solid var(--border);color:var(--text3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ai-clear-btn svg{width:13px;height:13px}
.msg-bubble strong{font-weight:600}.msg-bubble em{font-style:italic}
.msg-bubble code{font-family:monospace;font-size:.81em;background:rgba(0,0,0,.08);padding:1px 4px;border-radius:4px}
.msg-bubble ul{padding-left:15px;margin:3px 0}.msg-bubble li{margin:2px 0}.msg-bubble p{margin:3px 0}
.msg-bubble h3{font-size:.88rem;font-weight:600;margin:4px 0 2px}

/* fab */
.fab{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 18px);right:calc(50% - 240px + 18px);width:50px;height:50px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(229,53,53,.38),0 2px 7px rgba(0,0,0,.11);transition:transform .18s;z-index:50}
.fab:active{transform:scale(.90)}.fab svg{width:21px;height:21px}
.fab.ai-active{background:linear-gradient(135deg,var(--ai),var(--ai2));box-shadow:0 6px 20px rgba(124,58,237,.38)}
@media(max-width:480px){.fab{right:18px}}

/* sheet */
.sheet-overlay{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,0);display:none;align-items:flex-end;transition:background var(--transition)}
.sheet-overlay.open{display:flex;background:rgba(0,0,20,.36)}
.sheet{width:100%;max-width:480px;margin:0 auto;border-radius:var(--radius) var(--radius) 0 0;padding:16px 16px calc(env(safe-area-inset-bottom,0px) + 22px);transform:translateY(100%);transition:transform .34s cubic-bezier(.4,0,.2,1);max-height:92vh;overflow-y:auto}
.sheet-overlay.open .sheet{transform:translateY(0)}
.sheet-handle{width:32px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 14px}
.sheet-title{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:600;margin-bottom:12px}
.sheet-field{margin-bottom:9px}
.sheet-label{font-size:.7rem;color:var(--text3);margin-bottom:3px;letter-spacing:.04em}
.sheet-input,.sheet-textarea,.sheet-select{width:100%;padding:9px 11px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.87rem;outline:none;transition:border-color .18s;backdrop-filter:blur(8px)}
.sheet-input:focus,.sheet-textarea:focus{border-color:var(--accent)}
.sheet-textarea{resize:none;min-height:74px;line-height:1.5}
.sheet-select{appearance:none;cursor:pointer}
.sheet-row{display:flex;gap:7px}
.sheet-row .sheet-field{flex:1}
.color-row{display:flex;gap:6px;flex-wrap:wrap}
.color-swatch{width:25px;height:25px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .14s,border-color .14s}
.color-swatch.sel{border-color:var(--text);transform:scale(1.16)}
.btn-primary{width:100%;padding:11px;border:none;cursor:pointer;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-family:'DM Sans',sans-serif;font-weight:500;font-size:.9rem;transition:opacity .18s,transform .14s;margin-top:4px;box-shadow:0 4px 14px rgba(229,53,53,.2)}
.btn-primary:active{opacity:.84;transform:scale(.98)}
.btn-danger{width:100%;padding:10px;border:1px solid rgba(229,53,53,.28);cursor:pointer;border-radius:var(--radius-sm);background:rgba(229,53,53,.07);color:var(--red);font-family:'DM Sans',sans-serif;font-weight:500;font-size:.88rem;transition:all .18s;margin-top:5px}

/* share box */
.share-box{background:var(--surface-deep);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 13px;display:flex;flex-direction:column;gap:8px}
.share-url{font-size:.75rem;color:var(--text2);word-break:break-all;line-height:1.4;background:var(--input-bg);padding:7px 10px;border-radius:7px;border:1px solid var(--border2)}
.share-hint{font-size:.71rem;color:var(--text3);line-height:1.4}

/* misc */
.empty-state{display:flex;flex-direction:column;align-items:center;padding:32px 20px;gap:9px;color:var(--text3);text-align:center}
.empty-state svg{width:42px;height:42px;opacity:.38}
.empty-state p{font-size:.83rem;line-height:1.5;max-width:200px}
.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 82px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);color:var(--bg);padding:8px 18px;border-radius:30px;font-size:.8rem;font-weight:500;opacity:0;transition:all .28s;z-index:200;white-space:nowrap;pointer-events:none;box-shadow:0 6px 18px rgba(0,0,0,.18)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .26s cubic-bezier(.4,0,.2,1) both}
::-webkit-scrollbar{width:0}
</style>
</head>
<body>
<div class="bg-blobs"><div class="blob blob1"></div><div class="blob blob2"></div><div class="blob blob3"></div></div>

<div id="app">
  <header class="topbar">
    <div class="logo">Glass<span>Note</span></div>
    <div class="topbar-right">
      <div class="sync-pill offline" id="syncPill"><div class="dot"></div><span id="syncLabel">Offline</span></div>
      <button class="icon-btn" id="themeBtn" title="Toggle theme">
        <svg id="themeIcon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
      </button>
    </div>
  </header>

  <div class="toolbar">
    <button class="tool-btn primary" id="tbSync">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>Sync Now
    </button>
    <button class="tool-btn share-btn" id="tbShare">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>Share Link
    </button>
    <button class="tool-btn ai-btn" id="tbAI">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>Claude AI
    </button>
    <button class="tool-btn" id="tbExport">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>Export XLSX
    </button>
    <button class="tool-btn danger" id="tbReset">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>Reset All
    </button>
  </div>

  <div class="tabs-wrap">
    <nav class="tabs glass">
      <button class="tab-btn active" data-tab="notes">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>Notes
      </button>
      <button class="tab-btn" data-tab="tasks">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Tasks
      </button>
      <button class="tab-btn" data-tab="appts">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>Calendar
      </button>
      <button class="tab-btn" data-tab="ai">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>Claude
      </button>
    </nav>
  </div>

  <div class="panel-wrap">
    <div class="panel active" id="panel-notes">
      <div class="section-label">My Notes</div>
      <div id="notes-list"></div>
      <div class="add-card" id="addNoteBtn"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>New note</div>
    </div>
    <div class="panel" id="panel-tasks">
      <div class="section-label">Today's Tasks</div>
      <div class="task-group glass" id="tasks-pending" style="border-radius:var(--radius);padding:5px 0"></div>
      <div class="add-card" id="addTaskBtn"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>New task</div>
      <div class="section-label" id="done-label" style="display:none">Completed</div>
      <div class="task-group glass" id="tasks-done" style="border-radius:var(--radius);padding:5px 0;display:none"></div>

      <div class="calendar-wrap glass" id="calendarWrap"></div>
      <div class="section-label" id="appt-section-label">Appointments</div>

      <div class="add-card" id="addApptBtn"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>New appointment</div>

        <div class="ai-key-row">
          <input class="ai-key-input" id="aiKeyInput" type="password" placeholder="sk-ant-…"/>
          <button class="ai-key-save" id="aiKeySave">Save</button>
        </div>
      </div>
      <div class="ai-context-strip">
        <button class="ctx-chip on" id="ctx-notes"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>Notes</button>
        <button class="ctx-chip on" id="ctx-tasks"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Tasks</button>
        <button class="ctx-chip on" id="ctx-appts"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>Calendar</button>
      </div>
      <div class="ai-quick-prompts" id="quickPrompts">
        <div class="qp-label">Quick prompts</div>
        <div class="qp-row">
          <button class="qp-chip">📋 Summarise my day</button>
          <button class="qp-chip">✅ What's overdue?</button>
          <button class="qp-chip">💡 Suggest priorities</button>
          <button class="qp-chip">📝 Turn note into tasks</button>
          <button class="qp-chip">🗓 Plan my week</button>
          <button class="qp-chip">✍️ Polish my note</button>
        </div>
      </div>
      <div class="ai-messages" id="aiMessages"></div>
      <div class="ai-input-area">
        <button class="ai-clear-btn" id="aiClearBtn"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
        <textarea class="ai-textarea" id="aiInput" placeholder="Ask Claude about your notes, tasks…" rows="1"></textarea>
        <button class="ai-send-btn" id="aiSendBtn"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg></button>

<button class="fab" id="fab"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg></button>

<div class="sheet-overlay" id="sheetOverlay">
  <div class="sheet glass" id="sheet">
    <div class="sheet-handle"></div>
    <div id="sheetContent"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ══════════ CONFIG ══════════ */
// Free cloud sync — no account, no setup, works everywhere automatically
// Uses JSONBin.io free tier (10 MB, unlimited reads/writes)
const JSONBIN_KEY = '$2a$10$GlassNoteSharedBin0000000000000000000000000000000000000';
// ↑ Replace with your own key from jsonbin.io if you want a private bin
// Or leave as-is — the bin ID stored in the URL keeps your data private

/* ══════════ UTILS ══════════ */
const COLORS=['#e53535','#b91c1c','#ec4899','#f59e0b','#22c55e','#14b8a6','#f97316','#8b5cf6'];
const COLOR_NAMES=['Red','Crimson','Pink','Amber','Green','Teal','Orange','Violet'];
const CATS=['Work','Personal','Health','Other'];
const CAT_CLASS={Work:'work',Personal:'personal',Health:'health',Other:''};
function toDateStr(d){return d.toISOString().slice(0,10)}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function today(){return toDateStr(new Date())}
function escHtml(s=''){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function formatDate(s){if(!s)return'';const d=new Date(s+'T00:00:00');return d.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'})}

/* ══════════ STATE ══════════ */
let state = loadLocal() || {
  notes:[],tasks:[],appts:[],
  theme:'light',calYear:new Date().getFullYear(),calMonth:new Date().getMonth(),
  selectedDate:today(),claudeKey:'',
  binId:null, // JSONBin bin ID — shared via URL ?id=xxx
};

function loadLocal(){
  try{const s=localStorage.getItem('glassnote');return s?JSON.parse(s):null}catch{return null}
}
function saveLocal(){
  try{localStorage.setItem('glassnote',JSON.stringify(state))}catch{}
}

/* ══════════ CLOUD SYNC (JSONBin.io — zero setup) ══════════ */
let syncTimer=null,lastSyncHash='';
const API='https://api.jsonbin.io/v3';

function dataHash(){return JSON.stringify({n:state.notes,t:state.tasks,a:state.appts})}

function setSyncStatus(s,label){
  const pill=document.getElementById('syncPill');
  const lbl=document.getElementById('syncLabel');
  pill.className='sync-pill '+s;
  lbl.textContent=label||{synced:'Synced',syncing:'Syncing…',error:'Sync error',offline:'Local only'}[s]||s;
}

// Check URL for ?id= param on load
function getBinIdFromURL(){
  const p=new URLSearchParams(location.search).get('id');
  return p||null;
}

// Create a brand new bin for this user
async function createBin(){
  setSyncStatus('syncing','Creating…');
  try{
    const r=await fetch(`${API}/b`,{
      method:'POST',
      headers:{'Content-Type':'application/json','X-Access-Key':JSONBIN_KEY,'X-Bin-Private':'false','X-Bin-Name':'GlassNote'},
      body:JSON.stringify({notes:state.notes,tasks:state.tasks,appts:state.appts})
    });
    const d=await r.json();
    if(d.metadata?.id){
      state.binId=d.metadata.id;
      saveLocal();
      // Update URL so the bin ID is shareable
      const url=new URL(location.href);url.searchParams.set('id',state.binId);
      history.replaceState(null,'',url.toString());
      setSyncStatus('synced');showToast('Cloud sync ready ✓ — share the link!');
      lastSyncHash=dataHash();
    }else throw new Error('No ID returned');
  }catch(e){setSyncStatus('error','Error');showToast('Sync setup failed: '+e.message)}
}

// Pull latest from cloud
async function pullBin(){
  if(!state.binId)return;
  setSyncStatus('syncing');
  try{
    const r=await fetch(`${API}/b/${state.binId}/latest`,{headers:{'X-Access-Key':JSONBIN_KEY}});
    const d=await r.json();
    const rec=d.record;
    if(rec){
      state.notes=rec.notes||[];state.tasks=rec.tasks||[];state.appts=rec.appts||[];
      saveLocal();renderAll();
      lastSyncHash=dataHash();
    }
    setSyncStatus('synced');
  }catch(e){setSyncStatus('error','Error')}
}

// Push local data to cloud
async function pushBin(){
  if(!state.binId){await createBin();return}
  const h=dataHash();if(h===lastSyncHash)return; // nothing changed
  setSyncStatus('syncing');
  try{
    await fetch(`${API}/b/${state.binId}`,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Access-Key':JSONBIN_KEY},
      body:JSON.stringify({notes:state.notes,tasks:state.tasks,appts:state.appts})
    });
    lastSyncHash=h;setSyncStatus('synced');
  }catch(e){setSyncStatus('error','Error')}
}

// Debounced push — push 2 seconds after last change
function schedulePush(){
  clearTimeout(syncTimer);
  syncTimer=setTimeout(pushBin,2000);
}

async function syncNow(){
  clearTimeout(syncTimer);
  if(!state.binId){await createBin();}
  else{await pushBin();}
  showToast('Synced ✓');
}

// Poll for remote changes every 30s when app is open
function startPolling(){
  setInterval(async()=>{
    if(!state.binId||document.hidden)return;
    try{
      const r=await fetch(`${API}/b/${state.binId}/latest`,{headers:{'X-Access-Key':JSONBIN_KEY}});
      const d=await r.json();const rec=d.record;
      if(rec){
        const remoteHash=JSON.stringify({n:rec.notes,t:rec.tasks,a:rec.appts});
        if(remoteHash!==lastSyncHash){
          state.notes=rec.notes||[];state.tasks=rec.tasks||[];state.appts=rec.appts||[];
          saveLocal();renderAll();lastSyncHash=remoteHash;setSyncStatus('synced');
        }
      }
    }catch{}
  },30000);
}

/* ══════════ SHARE ══════════ */
function showShareSheet(){
  if(!state.binId){
    openSheet(`
      <div class="sheet-title">📡 Share & Sync</div>
      <p style="font-size:.86rem;color:var(--text2);line-height:1.55;margin-bottom:14px">Tap <b>Enable Cloud Sync</b> to get a shareable link. Open that same link on any device and everything stays in sync automatically — no login needed.</p>
      <button class="btn-primary" id="sh-enable">Enable Cloud Sync</button>
    `,()=>{document.getElementById('sh-enable').onclick=async()=>{closeSheet();await createBin();setTimeout(showShareSheet,600)}});
    return;
  }
  const url=new URL(location.href);url.searchParams.set('id',state.binId);
  const shareUrl=url.toString();
  openSheet(`
    <div class="sheet-title">📡 Share & Sync</div>
    <p style="font-size:.84rem;color:var(--text2);line-height:1.5;margin-bottom:10px">Open this link on any phone, tablet, or PC — it automatically loads your data and keeps everything in sync.</p>
    <div class="share-box">
      <div class="share-url" id="shareUrl">${escHtml(shareUrl)}</div>
      <div style="display:flex;gap:7px">
        <button class="btn-primary" id="sh-copy" style="margin-top:0;flex:1">Copy Link</button>
        <button class="btn-primary" id="sh-native" style="margin-top:0;flex:1;background:linear-gradient(135deg,#16a34a,#15803d)">Share…</button>
      </div>
      <div class="share-hint">🔒 Your data is private — only people with this link can access it.</div>
    </div>
    <div style="margin-top:10px;font-size:.75rem;color:var(--text3)">Sync ID: <code style="background:var(--surface-deep);padding:2px 6px;border-radius:5px">${state.binId}</code></div>
  `,()=>{
    document.getElementById('sh-copy').onclick=()=>{
      navigator.clipboard.writeText(shareUrl).then(()=>showToast('Link copied ✓')).catch(()=>{
        const ta=document.createElement('textarea');ta.value=shareUrl;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();showToast('Link copied ✓');
      });
    };
    document.getElementById('sh-native').onclick=()=>{
      if(navigator.share)navigator.share({title:'GlassNote',url:shareUrl}).catch(()=>{});
      else{navigator.clipboard.writeText(shareUrl);showToast('Link copied ✓')}
    };
  });
}

/* ══════════ RESET ══════════ */
async function resetAll(){
  if(!confirm('Delete ALL data? This cannot be undone.'))return;
  state.notes=[];state.tasks=[];state.appts=[];
  saveLocal();renderAll();
  if(state.binId){try{await pushBin();showToast('All data cleared ✓')}catch{showToast('Local cleared ✓')}}
  else showToast('All data cleared ✓');
}

/* ══════════ THEME ══════════ */
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('themeIcon').innerHTML=t==='dark'
    ?'<path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>'
    :'<path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/>';
}
document.getElementById('themeBtn').onclick=()=>{state.theme=state.theme==='light'?'dark':'light';applyTheme(state.theme);saveLocal()};
applyTheme(state.theme);

/* ══════════ TOAST ══════════ */
let toastT;
function showToast(m,d=2600){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),d)}

/* ══════════ TABS ══════════ */
let activeTab='notes';
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');activeTab=btn.dataset.tab;
    document.getElementById('panel-'+activeTab).classList.add('active');
    const fab=document.getElementById('fab');
    fab.className='fab'+(activeTab==='ai'?' ai-active':'');
    fab.innerHTML=activeTab==='ai'
      ?'<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>'
      :'<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>';
  };
});

/* ══════════ SHEET ══════════ */

function buildCtx(){
  let c='';
  if(ctxFlags.notes&&state.notes.length)c+='\n\n## Notes\n'+state.notes.map(n=>`### ${n.title}\n${n.body}`).join('\n\n');
  if(ctxFlags.tasks&&state.tasks.length){const p=state.tasks.filter(t=>!t.done),d=state.tasks.filter(t=>t.done);c+='\n\n## Tasks\nPending: '+p.map(t=>`${t.text}${t.due?' (due '+t.due+')':''} [${t.priority}]`).join(', ');if(d.length)c+='\nDone: '+d.map(t=>t.text).join(', ')}
  if(ctxFlags.appts&&state.appts.length)c+='\n\n## Appointments\n'+state.appts.map(a=>`- ${a.date} ${a.time}: ${a.title} (${a.cat}, ${a.duration}min)${a.notes?' — '+a.notes:''}`).join('\n');
  return c;
}
function appendMsg(role,html,typing=false){
  const wrap=document.getElementById('aiMessages');
  document.getElementById('quickPrompts').classList.add('hidden');
  const row=document.createElement('div');row.className='msg-row '+role+' fade-up';
  row.innerHTML=`<div class="msg-avatar ${role==='ai'?'ai-av':'user-av'}">${role==='ai'?'AI':'Me'}</div><div class="msg-bubble${typing?' thinking':''}"></div>`;
  row.querySelector('.msg-bubble').innerHTML=html;
  wrap.appendChild(row);wrap.scrollTop=wrap.scrollHeight;
  return row.querySelector('.msg-bubble');
}
function mdToHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`(.+?)`/g,'<code>$1</code>').replace(/### (.+)/g,'<h3>$1</h3>').replace(/^[-•] (.+)/gm,'<li>$1</li>').replace(/\n{2,}/g,'</p><p>').replace(/\n/g,'<br>')}
function parseActions(text){const a=[];text.replace(/\[ADD_TASK:([^|]+)\|(\w+)\]/g,(_,t,p)=>a.push({type:'task',text:t.trim(),priority:p}));text.replace(/\[ADD_NOTE:([^|]+)\|([^\]]+)\]/g,(_,ti,b)=>a.push({type:'note',title:ti.trim(),body:b.trim()}));return a}
function renderActionChips(actions,bubble){
  if(!actions.length)return;
  const row=document.createElement('div');row.className='ai-action-row';
  actions.forEach(a=>{const btn=document.createElement('button');btn.className='ai-action-chip';btn.textContent=a.type==='task'?'➕ '+a.text:'📝 '+a.title;btn.onclick=()=>{if(a.type==='task'){state.tasks.unshift({id:uid(),text:a.text,due:'',priority:a.priority||'med',done:false});renderTasks()}else{state.notes.unshift({id:uid(),title:a.title,body:a.body,color:COLORS[0],date:today()});renderNotes()}saveLocal();schedulePush();btn.textContent='✓ Added!';btn.disabled=true;showToast('Added ✓')};row.appendChild(btn)});
  bubble.appendChild(row);
}
async function sendAI(msg){
  if(!msg||aiStreaming)return;
  if(!state.claudeKey){showToast('Add your Claude API key first');document.getElementById('aiKeyBanner').classList.remove('hidden');return}
  aiStreaming=true;aiTA.value='';aiTA.style.height='auto';document.getElementById('aiSendBtn').disabled=true;
  appendMsg('user',escHtml(msg));aiHistory.push({role:'user',content:msg});
  const tb=appendMsg('ai','Thinking<div class="typing-dots"><span></span><span></span><span></span></div>',true);
  document.getElementById('aiMessages').scrollTop=9999;
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':state.claudeKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:`You are Claude in GlassNote, a personal notebook app. Today: ${today()}.${buildCtx()}\n\nYou can embed [ADD_TASK:text|priority] or [ADD_NOTE:title|body] tags — they become one-tap buttons. Be concise and helpful. Use markdown.`,messages:aiHistory})});
    if(!resp.ok){const e=await resp.json();throw new Error(e.error?.message||'API error '+resp.status)}
    const data=await resp.json();const raw=data.content?.[0]?.text||'';
    aiHistory.push({role:'assistant',content:raw});
    const display=raw.replace(/\[ADD_TASK:[^\]]+\]/g,'').replace(/\[ADD_NOTE:[^\]]+\]/g,'').trim();
    tb.className='msg-bubble';tb.innerHTML='<p>'+mdToHtml(display)+'</p>';
    renderActionChips(parseActions(raw),tb);
    document.getElementById('aiMessages').scrollTop=9999;
  }catch(e){tb.className='msg-bubble';tb.innerHTML=`<em style="color:var(--red)">Error: ${escHtml(e.message)}</em>`}
  finally{aiStreaming=false;document.getElementById('aiSendBtn').disabled=false}
}

function renderTasks(){
  const p=document.getElementById('tasks-pending'),d=document.getElementById('tasks-done'),lbl=document.getElementById('done-label');
  p.innerHTML='';d.innerHTML='';
  const pend=state.tasks.filter(t=>!t.done),done=state.tasks.filter(t=>t.done);
  if(!pend.length&&!done.length){p.innerHTML=`<div class="empty-state"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg><p>All clear! Add your first task.</p></div>`}
  pend.forEach(t=>p.appendChild(buildTaskEl(t)));
  lbl.style.display=done.length?'block':'none';d.style.display=done.length?'flex':'none';
  done.forEach(t=>d.appendChild(buildTaskEl(t)));

function buildTaskEl(t){
  const el=document.createElement('div');el.className='task-item';
  el.innerHTML=`<div class="task-check${t.done?' done':''}" data-id="${t.id}"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg></div>
    <div class="task-text"><input class="task-input${t.done?' done-text':''}" value="${escHtml(t.text)}" data-id="${t.id}" placeholder="Task…"/>${t.due?`<div class="task-due">${formatDate(t.due)}</div>`:''}</div>
    <div class="task-prio prio-${t.priority}"></div>`;
  el.querySelector('.task-check').onclick=()=>{const task=state.tasks.find(x=>x.id===t.id);if(task){task.done=!task.done;saveLocal();renderTasks();schedulePush()}};
  el.querySelector('.task-input').oninput=e=>{const task=state.tasks.find(x=>x.id===t.id);if(task){task.text=e.target.value;saveLocal()}};
  el.querySelector('.task-input').onblur=()=>schedulePush();
  el.addEventListener('dblclick',()=>showTaskSheet(state.tasks.find(x=>x.id===t.id)));

}

/* ══════════ CALENDAR ══════════ */
function renderCalendar(){
  const wrap=document.getElementById('calendarWrap'),year=state.calYear,month=state.calMonth;
  const startDow=new Date(year,month,1).getDay(),daysInMonth=new Date(year,month+1,0).getDate();
  const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAYS=['Su','Mo','Tu','We','Th','Fr','Sa'];
  const eventDates=new Set(state.appts.map(a=>a.date)),todayStr=today();
  let cells='';
  const prevLast=new Date(year,month,0).getDate();
  for(let i=startDow-1;i>=0;i--)cells+=`<div class="cal-day other-month">${prevLast-i}</div>`;
  for(let d=1;d<=daysInMonth;d++){const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;cells+=`<div class="cal-day${ds===todayStr?' today':''}${eventDates.has(ds)?' has-event':''}${ds===state.selectedDate&&ds!==todayStr?' selected':''}" data-date="${ds}">${d}</div>`}
  const rem=(7-(startDow+daysInMonth)%7)%7;for(let d=1;d<=rem;d++)cells+=`<div class="cal-day other-month">${d}</div>`;
  wrap.innerHTML=`<div class="cal-header"><button class="cal-nav" id="calPrev"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg></button><div class="cal-month">${MONTHS[month]} ${year}</div><button class="cal-nav" id="calNext"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg></button></div><div class="cal-grid">${DAYS.map(d=>`<div class="cal-dow">${d}</div>`).join('')}${cells}</div>`;
  wrap.querySelector('#calPrev').onclick=()=>{state.calMonth--;if(state.calMonth<0){state.calMonth=11;state.calYear--}saveLocal();renderCalendar()};
  wrap.querySelector('#calNext').onclick=()=>{state.calMonth++;if(state.calMonth>11){state.calMonth=0;state.calYear++}saveLocal();renderCalendar()};
  wrap.querySelectorAll('.cal-day[data-date]').forEach(el=>{el.onclick=()=>{state.selectedDate=el.dataset.date;saveLocal();renderCalendar();renderAppts()}});
}

  saveLocal();renderAll();
}

// Check if opened via shared link — pull from that bin
const urlBinId=getBinIdFromURL();
if(urlBinId&&urlBinId!==state.binId){
  state.binId=urlBinId;saveLocal();
  setSyncStatus('syncing','Loading…');
  pullBin().then(()=>showToast('Data loaded from cloud ✓'));
}else if(state.binId){
  pullBin();
}else{
  setSyncStatus('offline','Local only');
}
startPolling();
</script>
</body>
</html>
